{{- $url := .Get "url" -}}
{{- $icon := .Get "icon" | default "" -}}
<a href="{{ $url }}" class="inline-flex items-center gap-2 px-4 py-2 my-1 rounded-lg border border-current font-medium no-underline hover:opacity-80 transition-opacity" download>
  {{- if eq $icon "document-arrow-down" -}}
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="inline-block w-4 h-4"><path d="M12 15V3m0 12-4-4m4 4 4-4"/><path d="M2 17l.621 2.485A2 2 0 0 0 4.561 21h14.878a2 2 0 0 0 1.94-1.515L22 17"/></svg>
  {{- end -}}
  {{ .Inner }}
</a>
